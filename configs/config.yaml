detection:
  model_size: yolo26s
  confidence_threshold: 0.22
  image_size: 1536
  tile_grid: 2
  tile_overlap: 0.20
  max_det: 350
  iou_threshold: 0.65

object_detection:
  weights: weights/yolov8x-worldv2.pt
  confidence_threshold: 0.14
  image_size: 1280
  tile_grid: 2
  tile_overlap: 0.20
  max_det: 500
  iou_threshold: 0.65

pose:
  weights: weights/yolo11x-pose.pt
  confidence_threshold: 0.18
  image_size: 1152
  iou_threshold: 0.85
  max_det: 300
  ema_alpha: 0.30

tracking:
  max_age: 120
  min_hits: 2
  iou_threshold: 0.3
  max_cosine_distance: 0.4
  nn_budget: 100
  embedder: mobilenet
  embedder_gpu: true

identity:
  embedding_similarity_threshold: 0.65
  registry_path: outputs/student_registry.json
  embedding_model: mobilenet_v3_small

student_backbone:
  face_process_fps: 1.0
  face_det_size: 1600
  face_det_thresh: 0.20
  face_tile_grid: 3
  face_tile_overlap: 0.22
  face_min_size: 12
  primary_detector: scrfd
  backup_detector: retinaface
  enable_backup_detector: true
  adaface_weights: weights/adaface/adaface_ir101.onnx
  attribute_classifier_weights: ""
  attribute_classifier_config: ""
  accessory_conf_threshold: 0.55
  accessory_object_weights: weights/yolov8x-worldv2.pt
  accessory_object_conf_threshold: 0.20
  identity_db_path: detectors/face_detector/identity_db.json
  identity_db_save_every: 150
  ttl: 120
  archive_ttl: 1800
  sim_thresh: 0.42
  iou_weight: 0.22
  sim_weight: 0.70
  dist_weight: 0.08
  reid_sim_thresh: 0.50
  appearance_weight: 0.16
  min_face_sim: 0.18
  merge_sim_thresh: 0.58
  young_track_hits: 10
  min_confirm_hits: 2
  new_id_confirm_hits: 2
  new_id_confirm_quality: 0.20
  provisional_match_margin: 0.02
  high_det_score: 0.48
  continuity_window: 4
  continuity_iou_gate: 0.16
  continuity_dist_gate: 0.36
  continuity_relax: 0.12
  continuity_bonus: 0.14
  strong_named_match_score: 0.68
  candidate_vote_min_hits: 3
  candidate_vote_min_count: 2
  candidate_vote_avg_score: 0.48
  candidate_vote_margin: 0.055
  allow_new_identities: false
  scene_change_threshold: 0.14
  scene_unstable_inlier_ratio: 0.28
  scene_downsample_width: 160
  full_reid_interval: 24
  body_memory_frames: 18
  full_min_height: 160
  reduced_min_height: 96

roster_policy:
  student_details_root: student-details
  hard_cap_reportable_identities: true
  unknown_review_subdir: unknown_review

attendance:
  presence_threshold_seconds: 30
  min_track_frames: 20

attention:
  ema_alpha: 0.10
  enter_attentive: 0.25
  exit_attentive: 0.05
  enter_distracted: -0.35
  exit_distracted: -0.05
  min_state_hold: 8
  unknown_state_hold: 2
  enable_unknown_state: true
  phone_object_fps: 1.0
  pose_fps: 1.0
  full_min_evidence: 0.28
  reduced_min_evidence: 0.36
  limited_min_evidence: 0.60
  weights:
    looking_forward: 1.0
    hand_raised: 1.0
    distracted: -0.7
    using_phone: -2.0

seating:
  calibration_path: null
  initial_confirm_seconds: 1.0
  shift_confirm_seconds: 10.0
  seat_stick_seconds: 3.0

attendance_events:
  out_of_class_seconds: 20.0
  exit_zone_seconds: 8.0
  late_arrival_minutes: 5.0
  early_exit_minutes: 5.0

speech_topics:
  config_path: configs/topic_profiles.yaml
  course_profile: default

visual_speech:
  backend: vtp_proxy
  vtp_vsd_checkpoint: ""
  vtp_lip_checkpoint: weights/vtp/public_train_data/ft_lrs2.pth
  vtp_cnn_checkpoint: weights/vtp/public_train_data/feature_extractor.pth
  talknet_repo: third_party/TalkNet-ASD
  talknet_talkset_checkpoint: weights/talknet/pretrain_TalkSet.model
  talknet_ava_checkpoint: weights/talknet/pretrain_AVA.model

face_augmentation:
  hosted_model_id: ""
  prompt_style: "photo_realistic_identity_preserving"
  retry_count: 2
  sleep_seconds: 1.5
  deterministic_families:
    lighting: [shadow, low_light, backlight, harsh_light]
    quality: [blur, low_resolution, noise, compression]
    scale: [tiny_face, distant_face, partial_crop]
  hosted_families:
    pose: [left_profile, right_profile, slight_tilt, up_angle, down_angle]
    accessory: [sunglasses, cap, mask, scarf]
    combos: [cap_left_profile, cap_right_profile, cap_slight_tilt, cap_up_angle, cap_down_angle, mask_left_profile, mask_right_profile, mask_slight_tilt, mask_up_angle, mask_down_angle, sunglasses_left_profile, sunglasses_right_profile, sunglasses_slight_tilt, sunglasses_up_angle, sunglasses_down_angle]
    angle_quality_combos: [blur, low_light, shadow, low_resolution, tiny_face, compression]

system:
  device: auto
  headless: false
  save_video: true
  save_csv: true
  camera_id: cam_01
  frame_skip: 1
  report_min_track_frames: 12
  report_min_presence_seconds: 0.5
  report_min_track_frames_unnamed: 60
  report_min_presence_seconds_unnamed: 8.0
  overlay_min_track_frames_unnamed: 24
  overlay_min_presence_seconds_unnamed: 3.0
  output_dir: outputs
  log_level: INFO
